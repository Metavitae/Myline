<!DOCTYPE html>

<head>

<link rel="manifest" href="manifest.json">

  :root {
    --forest: #1A3A2A;
    --leaf: #2D6A4F;
    --sun: #F4A228;
    --sand: #F5F0E8;
    --white: #FAFAF8;
    --ink: #0F1F17;
    --mist: #E8F0EC;
    --accent: #E8622A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--white);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  nav {
    position: sticky; top: 0;
    background: var(--forest);
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 3px solid var(--sun);
  }

  .nav-mark {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--white);
    letter-spacing: -0.5px;
  }

  .nav-mark span { color: var(--sun); }

  .nav-cta {
    background: var(--sun);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 8px 16px;
    border: none;
    cursor: pointer;
  }

  .hero {
    background: var(--forest);
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: var(--sun);
    opacity: 0.12;
    pointer-events: none;
  }

  .hero-top {
    padding: 32px 20px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .hero-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--sun);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 24px; height: 2px;
    background: var(--sun);
  }

  .hero-h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 48px;
    line-height: 0.95;
    color: var(--white);
    letter-spacing: -2px;
    margin-bottom: 20px;
  }

  .hero-h1 em { font-style: normal; color: var(--sun); }

  .hero-body {
    font-size: 15px;
    line-height: 1.6;
    color: rgba(250,250,248,0.72);
    margin-bottom: 28px;
    max-width: 340px;
  }

  .hero-img-zone {
    width: 100%;
    height: 260px;
    overflow: hidden;
    flex-shrink: 0;
    border-top: 3px solid var(--sun);
  }

  .hero-img-zone img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: saturate(0.85) brightness(0.9);
  }

    background: var(--mist);
    border-bottom: 2px solid rgba(26,58,42,0.12);
  }

    font-size: 28px;

  .step-num {

  .features {
    padding: 36px 20px;
    background: var(--white);
  }

  .features-h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -1px;
    color: var(--forest);
    margin-bottom: 24px;
    line-height: 1.1;
  }

  .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    background: rgba(26,58,42,0.1);
    border: 2px solid rgba(26,58,42,0.1);
  }

  .feature-cell {
    background: var(--white);
    padding: 16px 14px;
  }

  .feature-icon { font-size: 20px; margin-bottom: 6px; display: block; }

  .feature-title {

    font-weight: 700;
    font-size: 13px;
    color: var(--forest);
    margin-bottom: 4px;
  }

    font-size: 11px;
    letter-spacing: 2px;
    color: var(--leaf);
    text-transform: uppercase;
    margin-bottom: 12px;

  .stats-h2 {

    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.8px;
    color: var(--forest);

  .plan-price {

    font-weight: 700;
    font-size: 15px;
    color: var(--white);

  .plan-arrow { margin-left: auto; color: var(--sun); font-size: 18px; }

  .testimonials {
    padding: 36px 20px;
    background: var(--mist);
  }

  .testimonials-h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: -0.8px;
    color: var(--forest);
    margin-bottom: 20px;
  }

  .testimonial-card {
    background: var(--white);
    border: 1px solid rgba(26,58,42,0.12);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;

  .test-portrait {
    width: 52px; height: 52px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid var(--sun);

  .test-portrait img {
    width: 100%; height: 100%;

  .test-body p { font-size: 13px; color: var(--ink); line-height: 1.5; margin-bottom: 6px; }

  .test-name {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--leaf);
    text-transform: uppercase;
    letter-spacing: 1px;

  .cta-block {
    padding: 40px 20px;
    background: var(--sun);
    text-align: center;
    border-top: 3px solid var(--ink);
    border-bottom: 3px solid var(--ink);
  }

  .cta-h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: -1.5px;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 10px;
  }

  .cta-sub { font-size: 15px; color: rgba(15,31,23,0.7); margin-bottom: 24px; line-height: 1.5; }

  .btn-main {
    display: block;
    width: 100%;
    background: var(--forest);
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 16px;
    padding: 16px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    margin-bottom: 10px;
  }

  .btn-ghost {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 13px;
    padding: 12px;
    border: 2px solid var(--ink);
    cursor: pointer;
    text-decoration: none;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,31,23,0.8);
    z-index: 1000;
    align-items: flex-end;
  }

  .modal-overlay.active { display: flex; }

  .modal-sheet {
    background: var(--white);
    width: 100%;
    max-height: 90svh;
    overflow-y: auto;
    padding: 28px 20px 40px;
    border-top: 4px solid var(--sun);
    position: relative;
  }

  .modal-close-btn {
    position: absolute;
    top: 12px; right: 16px;
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--leaf);
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
  }

  .modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 26px;
    color: var(--forest);
    letter-spacing: -1px;
    margin-bottom: 4px;
  }

  .modal-sub-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--leaf);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(26,58,42,0.12);
  }

  .field-group { margin-bottom: 16px; }

  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--leaf);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 6px;
  }

  .field-input {
    width: 100%;
    background: var(--mist);
    border: 1px solid rgba(26,58,42,0.2);
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
  }

  .field-input:focus { border-color: var(--sun); }

  .success-state { display: none; text-align: center; padding: 30px 0; }
  .success-icon { font-size: 40px; margin-bottom: 12px; display: block; }
  .success-state h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--forest);
    letter-spacing: -0.8px;
    margin-bottom: 8px;
  }
  .success-state p { font-size: 13px; color: #5A7060; }

  footer { background: var(--ink); padding: 28px 20px; }

  .footer-mark {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: var(--white);
    margin-bottom: 6px;
  }

  .footer-mark span { color: var(--sun); }

  .footer-tagline {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .footer-legal { font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.7; }
  .footer-legal a { color: rgba(244,162,40,0.5); text-decoration: none; }
</style>

function fmtPrice(symbol, amount, currency) {
  if (['MXN','COP','ARS','CLP'].includes(currency)) return symbol + amount.toLocaleString();
  return symbol + amount.toFixed(2);
}

async function detectCountry() {
  try {
    const r = await fetch('https://ipapi.co/json/');
    const d = await r.json();
    return d.country_code || 'DEFAULT';
  } catch(e) {
    const lang = navigator.language || 'en';
    if (lang.startsWith('pt')) return 'BR';
    if (lang.startsWith('es')) return 'MX';
    return 'DEFAULT';
  }
}

function openModal(e) {
  if (e) e.preventDefault();
  document.getElementById('modal').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.body.style.overflow = '';
}
function closeIfOverlay(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
function submitForm(e) {
  e.preventDefault();
  const form = document.getElementById('mlForm');
  const btn = document.getElementById('modal-btn');
  const orig = btn.textContent;
  btn.disabled = true;
  fetch(form.action, {
    method:'POST', body:new FormData(form), headers:{'Accept':'application/json'}
  }).then(()=>{
    form.style.display='none';
    document.getElementById('successState').style.display='block';
  }).catch(()=>{ btn.textContent=orig; btn.disabled=false; });
}


// ─── RECEIPT LOGIC ───────────────────────────────────────────────────────────
let currentLoc = null;
let currentT = null;

function updateReceipt() {
  if (!currentLoc || !currentT) return;
  const years = parseInt(document.getElementById('years-input').value) || 3;
  const sym = currentLoc.symbol;
  const cur = currentLoc.currency;
  
  // Average carrier monthly costs by currency
  const monthlyCarrier = {
    MXN: 299, COP: 35000, ARS: 4500, CLP: 8990,
    PEN: 49, BRL: 49, EUR: 19.99, GBP: 15.99,
    USD: 24.99, CAD: 39.99, AUD: 34.99
  };
  
  const monthly = monthlyCarrier[cur] || 24.99;
  const annual = monthly * 12;
  const total = annual * years;
  const mylinePrice = currentLoc.prices.digital;
  
  const fmt = (n) => {
    if (['MXN','COP','ARS','CLP'].includes(cur)) return sym + Math.round(n).toLocaleString();
    return sym + n.toFixed(2);
  };
  
  document.getElementById('r-monthly').textContent = fmt(monthly) + ' / mo';
  document.getElementById('r-annual').textContent = fmt(annual) + ' / yr';
  document.getElementById('r-total').textContent = fmt(total);
  document.getElementById('r-myline').textContent = fmt(mylinePrice) + ' once';
}
